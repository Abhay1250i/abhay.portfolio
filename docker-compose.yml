version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: anidev_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - anidev_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anidev_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/anidev
      - JWT_SECRET=jwt_secret_key_ani_dev
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - anidev_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anidev_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - anidev_network

volumes:
  mongo_data:

networks:
  anidev_network:
    driver: bridge
